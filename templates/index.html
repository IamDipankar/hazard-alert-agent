<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>Bengali ASR Demo</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f7fb;
      color: #172033;
    }
    .container {
      display: grid;
      grid-template-columns: 360px 1fr;
      gap: 24px;
      align-items: stretch;
      min-height: 80vh;
    }
    .panel, .textbox {
      background: white;
      border-radius: 18px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      padding: 24px;
    }
    h1 { margin-top: 0; font-size: 28px; }
    .hint { color: #52607a; line-height: 1.55; }
    #holdBtn {
      width: 100%;
      min-height: 160px;
      border: none;
      border-radius: 22px;
      font-size: 28px;
      font-weight: 700;
      cursor: pointer;
      background: #2563eb;
      color: white;
      transition: transform 0.08s ease, background 0.2s ease;
      user-select: none;
      touch-action: none;
    }
    #holdBtn.active {
      background: #dc2626;
      transform: scale(0.98);
    }
    #status {
      margin-top: 18px;
      padding: 14px 16px;
      border-radius: 14px;
      background: #eef2ff;
      min-height: 24px;
      font-size: 16px;
    }
    textarea {
      width: 100%;
      height: 72vh;
      border: 2px solid #d8e0ef;
      border-radius: 18px;
      padding: 18px;
      font-size: 28px;
      line-height: 1.5;
      resize: vertical;
      box-sizing: border-box;
    }
    .row {
      display: flex;
      gap: 12px;
      margin-top: 14px;
    }
    button.secondary {
      flex: 1;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      cursor: pointer;
      background: #e2e8f0;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="panel">
      <h1>Press and hold to speak</h1>
      <p class="hint">
        Hold the big button, speak in Bengali, and release when done.
        The transcript will keep updating on the right while you talk.
      </p>
      <button id="holdBtn">🎙️ Hold to talk</button>
      <div id="status">Connecting...</div>
      <div class="row">
        <button class="secondary" id="clearBtn">Clear text</button>
      </div>
    </div>
    <div class="textbox">
      <textarea id="transcript" placeholder="বাংলা কথাগুলো এখানে দেখা যাবে..."></textarea>
    </div>
  </div>

<script>
  const holdBtn = document.getElementById("holdBtn");
  const statusEl = document.getElementById("status");
  const transcriptEl = document.getElementById("transcript");
  const clearBtn = document.getElementById("clearBtn");

  let ws = null;
  let audioContext = null;
  let mediaStream = null;
  let sourceNode = null;
  let processorNode = null;
  let isRecording = false;
  let sampleRate = 48000;

  function setStatus(msg) {
    statusEl.textContent = msg;
  }

  function ensureWebSocket() {
    return new Promise((resolve, reject) => {
      if (ws && ws.readyState === WebSocket.OPEN) {
        resolve(ws);
        return;
      }
      const protocol = window.location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(`${protocol}//${window.location.host}/ws`);
      ws.binaryType = "arraybuffer";

      ws.onopen = () => {
        setStatus("Ready.");
        resolve(ws);
      };

      ws.onmessage = (event) => {
        try {
          const msg = JSON.parse(event.data);
          if (msg.text !== undefined) {
            transcriptEl.value = msg.text;
          }
          if (msg.status) {
            setStatus(msg.status);
          }
          if (msg.error) {
            setStatus("Error: " + msg.error);
          }
        } catch (e) {
          console.error(e);
        }
      };

      ws.onclose = () => {
        setStatus("Socket closed. Press again to reconnect.");
      };

      ws.onerror = (err) => {
        console.error(err);
        setStatus("WebSocket error.");
        reject(err);
      };
    });
  }

  function floatTo16BitPCM(float32Array) {
    const out = new Int16Array(float32Array.length);
    for (let i = 0; i < float32Array.length; i++) {
      const s = Math.max(-1, Math.min(1, float32Array[i]));
      out[i] = s < 0 ? s * 0x8000 : s * 0x7fff;
    }
    return out;
  }

  async function startRecording() {
    if (isRecording) return;

    await ensureWebSocket();

    transcriptEl.value = "";
    mediaStream = await navigator.mediaDevices.getUserMedia({
      audio: {
        channelCount: 1,
        echoCancellation: true,
        noiseSuppression: true,
        autoGainControl: true
      }
    });

    audioContext = new (window.AudioContext || window.webkitAudioContext)();
    sampleRate = audioContext.sampleRate;
    sourceNode = audioContext.createMediaStreamSource(mediaStream);
    processorNode = audioContext.createScriptProcessor(4096, 1, 1);

    ws.send(JSON.stringify({event: "start", sample_rate: sampleRate}));

    processorNode.onaudioprocess = (event) => {
      if (!isRecording || !ws || ws.readyState !== WebSocket.OPEN) return;
      const input = event.inputBuffer.getChannelData(0);
      const pcm16 = floatTo16BitPCM(input);
      ws.send(pcm16.buffer);
    };

    sourceNode.connect(processorNode);
    processorNode.connect(audioContext.destination);

    isRecording = true;
    holdBtn.classList.add("active");
    holdBtn.textContent = "🛑 Release to stop";
    setStatus("Listening...");
  }

  async function stopRecording() {
    if (!isRecording) return;
    isRecording = false;

    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify({event: "stop"}));
    }

    if (processorNode) {
      processorNode.disconnect();
      processorNode.onaudioprocess = null;
      processorNode = null;
    }
    if (sourceNode) {
      sourceNode.disconnect();
      sourceNode = null;
    }
    if (mediaStream) {
      mediaStream.getTracks().forEach(track => track.stop());
      mediaStream = null;
    }
    if (audioContext) {
      await audioContext.close();
      audioContext = null;
    }

    holdBtn.classList.remove("active");
    holdBtn.textContent = "🎙️ Hold to talk";
    setStatus("Processing final text...");
  }

  holdBtn.addEventListener("pointerdown", async (e) => {
    e.preventDefault();
    try {
      await startRecording();
    } catch (err) {
      console.error(err);
      setStatus("Could not start microphone. Make sure mic permission is allowed.");
    }
  });

  ["pointerup", "pointerleave", "pointercancel"].forEach(evt => {
    holdBtn.addEventListener(evt, (e) => {
      e.preventDefault();
      stopRecording();
    });
  });

  clearBtn.addEventListener("click", () => {
    transcriptEl.value = "";
  });

  ensureWebSocket();
</script>
</body>
</html>
